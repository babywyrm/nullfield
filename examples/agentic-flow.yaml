apiVersion: nullfield.io/v1alpha1
kind: AgenticFlow
metadata:
  name: astra-jira
  namespace: prod
spec:
  lane: delegated
  transport: A
  selector:
    matchLabels:
      app: astra
  network:
    egress:
      - name: atlassian
        cidr: 104.192.136.0/21
        ports: [443]
  mesh:
    istio:
      principals:
        - cluster.local/ns/prod/sa/astra-runtime
      ports: [9090]
    cilium:
      ingress:
        - fromEndpoints:
            - app: astra-runtime
          port: 9090
          methods: [POST]
    linkerd:
      servers:
        - name: astra-mcp
          port: 9090
          identities:
            - astra-runtime.prod.serviceaccount.identity.linkerd.cluster.local
  credentials:
    - name: jira-read
      from: vault
      secretRef: jira-read-token
      injectAs: token
      oauth:
        audience: https://api.atlassian.com
        scopes: [read:jira-work]
      auditLabels:
        provider: atlassian
  tools:
    - name: mcp-atlassian.read_issue
      description: Read Jira issues on approved projects
      action: ALLOW
      allowedScopes: [PRODENG, AIFE, EE]
      auditLabels:
        system: jira
        resource: issue

    - name: mcp-atlassian.search
      description: Search Jira with a scoped read credential
      action: ALLOW
      credentialRefs: [jira-read]
      auditLabels:
        system: jira

    - name: mcp-atlassian.add_comment
      action: HOLD
      reason: Jira comments require human approval
      hold:
        timeout: 5m
        onTimeout: DENY
      auditLabels:
        system: jira
        operation: comment

    - name: mcp-atlassian.delete_page
      action: DENY
      reason: delete is outside the known acceptable path
      auditLabels:
        system: confluence
        operation: delete
