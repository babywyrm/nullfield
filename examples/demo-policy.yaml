apiVersion: nullfield.io/v1alpha1
kind: NullfieldPolicy
metadata:
  name: demo-policy
spec:
  selector:
    matchLabels:
      app: nullfield-demo
  rules:
    # Allow echo and read-only tools
    - action: ALLOW
      mcpMethod: tools/call
      toolNames:
        - echo
        - github_get_file
        - jira_get_issue
        - jira_search
      requireIdentity: true
      maxCallsPerMinute: 60

    # Allow write tools with lower rate
    - action: ALLOW
      mcpMethod: tools/call
      toolNames:
        - github_create_pr
        - pagerduty_resolve
      requireIdentity: true
      maxCallsPerMinute: 10

    # Deny everything else
    - action: DENY
      mcpMethod: tools/call
      toolNames: ["*"]

  circuitBreaker:
    maxToolCallsPerSession: 50
    maxSessionDuration: 120s
    onTrip: KILL_POD

  audit:
    logLevel: FULL
