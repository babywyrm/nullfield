apiVersion: nullfield.io/v1alpha1
kind: NullfieldPolicy
metadata:
  name: beta-policy
spec:
  selector:
    matchLabels:
      app: beta
  rules:
    - action: ALLOW
      mcpMethod: tools/call
      toolNames:
        - "beta.query"
        - "beta.submit"
    - action: DENY
      mcpMethod: tools/call
      toolNames: ["*"]
      reason: "beta: tool not in allow list"
