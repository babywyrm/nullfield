apiVersion: nullfield.io/v1alpha1
kind: NullfieldPolicy
metadata:
  name: minimal
spec:
  rules:
    - action: ALLOW
      mcpMethod: tools/call
      toolNames: [github_create_pr, jira_get_issue]
      maxCallsPerMinute: 30
    - action: DENY
      mcpMethod: tools/call
      toolNames: ["*"]

  circuitBreaker:
    maxToolCallsPerSession: 100
    maxSessionDuration: 300s
    onTrip: KILL_POD

  audit:
    logLevel: FULL
