{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "nullfield.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nullfield.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "nullfield.fullname" . }}
  labels:
    {{- include "nullfield.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["configmaps", "secrets", "pods"]
    verbs: ["get", "list", "watch", "create", "update"]
  - apiGroups: ["nullfield.io"]
    resources: ["agenticflows", "nullfieldpolicies", "toolregistries"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["nullfield.io"]
    resources: ["agenticflows/status"]
    verbs: ["patch", "update"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["get", "create", "update"]
  - apiGroups: ["security.istio.io"]
    resources: ["authorizationpolicies"]
    verbs: ["get", "create", "update"]
  - apiGroups: ["cilium.io"]
    resources: ["ciliumnetworkpolicies"]
    verbs: ["get", "create", "update"]
  - apiGroups: ["policy.linkerd.io"]
    resources: ["servers", "serverauthorizations"]
    verbs: ["get", "create", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "nullfield.fullname" . }}
  labels:
    {{- include "nullfield.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "nullfield.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "nullfield.fullname" . }}
    namespace: {{ .Release.Namespace }}
