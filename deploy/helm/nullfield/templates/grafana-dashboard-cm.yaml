{{- if .Values.monitoring.grafanaDashboard.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "nullfield.fullname" . }}-grafana-dashboard
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nullfield.labels" . | nindent 4 }}
    grafana_dashboard: "1"
data:
  nullfield-dashboard.json: |
    {{- .Files.Get "files/grafana-dashboard.json" | nindent 4 }}
{{- end }}
