apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: nullfield
  namespace: nullfield
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "watch", "list", "create", "update"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
  - apiGroups: ["nullfield.io"]
    resources: ["agenticflows", "nullfieldpolicies", "toolregistries"]
    verbs: ["get", "watch", "list"]
  - apiGroups: ["nullfield.io"]
    resources: ["agenticflows/status"]
    verbs: ["patch", "update"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["get", "create", "update"]
  - apiGroups: ["security.istio.io"]
    resources: ["authorizationpolicies"]
    verbs: ["get", "create", "update"]
  - apiGroups: ["cilium.io"]
    resources: ["ciliumnetworkpolicies"]
    verbs: ["get", "create", "update"]
  - apiGroups: ["policy.linkerd.io"]
    resources: ["servers", "serverauthorizations"]
    verbs: ["get", "create", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: nullfield
  namespace: nullfield
subjects:
  - kind: ServiceAccount
    name: nullfield
    namespace: nullfield
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: nullfield
