apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../manifests
  - mesh-policy.yaml

patches:
  - target:
      kind: Deployment
      name: nullfield-demo
    patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: nullfield-demo
      spec:
        template:
          metadata:
            annotations:
              linkerd.io/inject: enabled
              config.linkerd.io/opaque-ports: "9090"
              config.linkerd.io/skip-inbound-ports: "9091"
