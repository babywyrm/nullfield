apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: toolregistries.nullfield.io
spec:
  group: nullfield.io
  names:
    kind: ToolRegistry
    listKind: ToolRegistryList
    plural: toolregistries
    singular: toolregistry
    shortNames:
      - nftr
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            tools:
              type: array
              items:
                type: object
                properties:
                  name:
                    type: string
                  description:
                    type: string
                  allowedScopes:
                    type: array
                    items:
                      type: string
                  signatureHash:
                    type: string
                  maxCallsPerMinute:
                    type: integer
                required:
                  - name
      additionalPrinterColumns:
        - name: Tools
          type: integer
          jsonPath: .tools
          description: Number of registered tools
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      subresources:
        status: {}
