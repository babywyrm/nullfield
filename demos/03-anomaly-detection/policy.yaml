apiVersion: nullfield.io/v1alpha1
kind: NullfieldPolicy
metadata:
  name: anomaly-demo
spec:
  rules:
    - action: ALLOW
      mcpMethod: tools/call
      toolNames:
        - github_create_pr
        - jira_get_issue
        - pagerduty_resolve
      requireIdentity: true
      maxCallsPerMinute: 30

    - action: DENY
      mcpMethod: tools/call
      toolNames: ["*"]

  circuitBreaker:
    maxToolCallsPerSession: 50
    maxSessionDuration: 120s
    onTrip: KILL_POD

  integrity:
    bindToSession: true
    detectReplay: true

  anomaly:
    enabled: true
    velocity:
      threshold: 5
      alertAction: LOG
    sequences:
      - name: recon-then-exfil
        pattern: ["jira_search", "github_get_file", "github_create_pr"]
        action: DENY
        reason: "suspicious recon-to-exfil sequence"

  audit:
    logLevel: FULL
