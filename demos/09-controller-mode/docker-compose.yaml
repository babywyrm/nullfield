services:
  echo-server:
    build:
      context: ../..
      dockerfile: tests/echo-server/Dockerfile
    expose:
      - "8080"
    environment:
      LISTEN_ADDR: ":8080"

  nullfield:
    build:
      context: ../..
      dockerfile: Dockerfile
    ports:
      - "9090:9090"
      - "9091:9091"
    environment:
      NULLFIELD_LISTEN_ADDR: ":9090"
      NULLFIELD_UPSTREAM_ADDR: "echo-server:8080"
      NULLFIELD_ADMIN_ADDR: ":9091"
      NULLFIELD_POLICY_PATH: "/etc/nullfield/policy.yaml"
      NULLFIELD_REGISTRY_PATH: "/etc/nullfield/tools.yaml"
      NULLFIELD_CIRCUIT_MAX_CALLS: "50"
      NULLFIELD_CIRCUIT_MAX_DURATION: "5m"
      NULLFIELD_AUDIT_LOG_LEVEL: "FULL"
      NULLFIELD_CONTROLLER_ADDR: "nullfield-controller:9092"
    volumes:
      - ./policy.yaml:/etc/nullfield/policy.yaml:ro
      - ../../examples/tools.yaml:/etc/nullfield/tools.yaml:ro
    depends_on:
      echo-server:
        condition: service_started
      nullfield-controller:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9091/healthz"]
      interval: 10s
      timeout: 3s
      retries: 3

  nullfield-controller:
    build:
      context: ../..
      dockerfile: Dockerfile.controller
    ports:
      - "9092:9092"
      - "9093:9093"
    expose:
      - "9091"
    environment:
      NULLFIELD_CONTROLLER_GRPC_ADDR: ":9092"
      NULLFIELD_CONTROLLER_ADMIN_ADDR: ":9093"
      NULLFIELD_CONTROLLER_HEALTH_ADDR: ":9091"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9091/healthz"]
      interval: 10s
      timeout: 3s
      retries: 3
