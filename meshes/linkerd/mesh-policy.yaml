apiVersion: policy.linkerd.io/v1beta3
kind: Server
metadata:
  name: nullfield-proxy
  namespace: nullfield
spec:
  podSelector:
    matchLabels:
      app: nullfield-demo
  port: 9090
  proxyProtocol: HTTP/1
---
apiVersion: policy.linkerd.io/v1beta1
kind: ServerAuthorization
metadata:
  name: nullfield-proxy-authz
  namespace: nullfield
spec:
  server:
    name: nullfield-proxy
  client:
    meshTLS:
      identities:
        - "*.nullfield.serviceaccount.identity.linkerd.cluster.local"
---
apiVersion: policy.linkerd.io/v1beta3
kind: Server
metadata:
  name: nullfield-admin
  namespace: nullfield
spec:
  podSelector:
    matchLabels:
      app: nullfield-demo
  port: 9091
  proxyProtocol: HTTP/1
---
apiVersion: policy.linkerd.io/v1beta1
kind: ServerAuthorization
metadata:
  name: nullfield-admin-authz
  namespace: nullfield
spec:
  server:
    name: nullfield-admin
  client:
    unauthenticated: true
